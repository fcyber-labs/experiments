name: rag-pipeline

x-airflow-common:
  &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  env_file:
    - ../.env                          # ← auto-load .env so --env-file not needed
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    REDIS_HOST: redis
    REDIS_PORT: 6379
    QDRANT_HOST: qdrant
    QDRANT_PORT: 6333
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PROMETHEUS_PUSHGATEWAY: http://prometheus-pushgateway:9091
    # S3 optional
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    # Embedding — free HuggingFace model (no OpenAI key needed)
    RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    # Metadata DB
    RAG_METADATA_DB_HOST: postgres
    RAG_METADATA_DB_PORT: 5432
    RAG_METADATA_DB_NAME: rag_metadata
    RAG_METADATA_DB_USER: airflow
    RAG_METADATA_DB_PASSWORD: airflow

  volumes:
    - ../dags:/opt/airflow/dags
    - ../data:/opt/airflow/data
    - ../logs:/opt/airflow/logs
    - ../plugins:/opt/airflow/plugins
    - airflow-worker-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    qdrant:
      condition: service_healthy

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2-alpine
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    volumes:
      - redis-data:/data

  # FIX: healthcheck uses bash /dev/tcp — curl not installed in qdrant image
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: always

  # Depends on airflow-init so 'mlflow' DB is created first
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://airflow:airflow@postgres/mlflow
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://airflow:airflow@postgres/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

  prometheus:
    image: prom/prometheus:v2.48.1
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: always

  prometheus-pushgateway:
    image: prom/pushgateway:v1.6.2
    ports:
      - "9091:9091"
    restart: always

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: [""] 
    command: streamlit run /opt/airflow/streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ../streamlit_app:/opt/airflow/streamlit_app
      - ../dags:/opt/airflow/dags
    depends_on:
      - qdrant
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # FIX 1: PYTHONPATH so root user can find psycopg2 (installed for airflow user)
  # FIX 2: qdrant uses service_started (init doesn't need qdrant healthy)
  # FIX 3: DB creation runs BEFORE exec (exec replaces the shell process)
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins}

        echo ">>> Creating mlflow + rag_metadata databases..."
        PYTHONPATH=/home/airflow/.local/lib/python3.11/site-packages python3 - << 'PYEOF'
        import psycopg2, sys, time

        for attempt in range(10):
            try:
                conn = psycopg2.connect(
                    host="postgres", user="airflow",
                    password="airflow", dbname="airflow"
                )
                break
            except psycopg2.OperationalError:
                print(f"  waiting for postgres... ({attempt+1}/10)")
                time.sleep(3)
        else:
            print("ERROR: could not connect to postgres after 10 attempts")
            sys.exit(1)

        conn.autocommit = True
        cur = conn.cursor()
        for db in ("mlflow", "rag_metadata"):
            cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (db,))
            if not cur.fetchone():
                cur.execute(f"CREATE DATABASE {db}")
                print(f"  created database: {db}")
            else:
                print(f"  already exists:   {db}")
        cur.close()
        conn.close()

        conn2 = psycopg2.connect(
            host="postgres", user="airflow",
            password="airflow", dbname="rag_metadata"
        )
        conn2.autocommit = True
        cur2 = conn2.cursor()
        with open("/sources/sql/init.sql") as f:
            cur2.execute(f.read())
        cur2.close()
        conn2.close()
        print("  rag_metadata schema: OK")
        PYEOF

        echo ">>> Handing off to Airflow entrypoint..."
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    user: "0:0"
    volumes:
      - ../:/sources
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started   # init doesn't use qdrant

volumes:
  postgres-db-volume:
  redis-data:
  qdrant-storage:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:
  airflow-worker-logs: