[pytest]
minversion = 7.0
addopts =
    -v
    --tb=short
    --disable-warnings
    --strict-markers

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

markers =
    unit: unit tests (fast)
    integration: integration tests (slower, may require external services)

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning