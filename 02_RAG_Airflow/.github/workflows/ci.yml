

name: RAG Pipeline - Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.7.1'

jobs:
  # =============================================
  # Job 1: Code Quality & Linting
  # =============================================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint mypy
          pip install -r requirements.txt
      
      - name: Run Black (code formatting check)
        run: |
          black --check --diff dags/ streamlit_app/ tests/
      
      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff dags/ streamlit_app/ tests/
      
      - name: Run Flake8 (linting)
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 dags/ streamlit_app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 dags/ streamlit_app/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics
      
      - name: Run Pylint (advanced linting)
        run: |
          pylint dags/ --disable=C0111,R0903,C0103 --max-line-length=120 --exit-zero
        continue-on-error: true
      
      - name: Run MyPy (type checking)
        run: |
          mypy dags/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # =============================================
  # Job 2: Unit Tests
  # =============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      # Redis for deduplication tests
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      # PostgreSQL for metadata tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock pytest-asyncio
      
      - name: Set up test environment variables
        run: |
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "QDRANT_PORT=6333" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=test-key-not-real" >> $GITHUB_ENV
      
      - name: Run pytest
        run: |
          pytest tests/ \
            --verbose \
            --cov=dags \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --junit-xml=pytest-report.xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            pytest-report.xml
            htmlcov/
      
      - name: Comment test coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

  # =============================================
  # Job 3: Airflow DAG Validation
  # =============================================
  dag-validation:
    name: Airflow DAG Integrity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Airflow and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Test DAG imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'dags')
          from rag_refresh_dag import dag
          print(f'✓ DAG loaded successfully: {dag.dag_id}')
          print(f'✓ Total tasks: {len(dag.tasks)}')
          "
      
      - name: Run DAG validation tests
        run: |
          pytest tests/test_dag_integrity.py -v
      
      - name: Check for DAG cycles
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'dags')
          from rag_refresh_dag import dag
          try:
              dag.test_cycle()
              print('✓ No cycles detected in DAG')
          except Exception as e:
              print(f'✗ Cycle detected: {e}')
              sys.exit(1)
          "
      
      - name: Validate DAG structure
        run: |
          python scripts/validate_dag_structure.py

  # =============================================
  # Job 4: Docker Build Test
  # =============================================
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Build Airflow Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: rag-pipeline:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      
      - name: Test Docker Compose configuration
        run: |
          cd docker
          docker compose config > /dev/null
          echo "✓ Docker Compose configuration is valid"
      
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-pipeline:test
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================
  # Job 5: Security Checks
  # =============================================
  security:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
      
      - name: Run Safety (dependency vulnerability check)
        run: |
          pip install -r requirements.txt
          safety check --json || true
        continue-on-error: true
      
      - name: Run Bandit (security linting)
        run: |
          bandit -r dags/ streamlit_app/ -f json -o bandit-report.json || true
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json

  # =============================================
  # Job 6: Documentation Check
  # =============================================
  docs:
    name: Documentation Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "✗ README.md not found"
            exit 1
          fi
          echo "✓ README.md exists"
      
      - name: Validate markdown
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true
      
      - name: Check for required documentation files
        run: |
          required_files=(
            "README.md"
            "requirements.txt"
            ".env.example"
            "data/benchmark_queries.json"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done

  # =============================================
  # Job 7: Build Summary
  # =============================================
  build-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, dag-validation, docker-build, security, docs]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAG Validation | ${{ needs.dag-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if any critical job failed
        if: |
          needs.lint.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.dag-validation.result == 'failure' ||
          needs.docker-build.result == 'failure'
        run: |
          echo "❌ One or more critical jobs failed"
          exit 1
